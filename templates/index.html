<!DOCTYPE html>
<html>
<head>
    <title>Resume Screener</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h2 class="text-center mb-4">AI Resume Screening System</h2>

        <form action="/analyze" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Upload Resume (PDF)</label>
                <input type="file" class="form-control" name="resume" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea class="form-control" name="jd" rows="6" placeholder="Paste job description here..." required></textarea>
            </div>

            <button class="btn btn-primary w-100">Analyze Resume</button>
        </form>

    </div>
</div>

</body>
</html>
